name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release
          merge-multiple: true

      - name: Rename artifacts
        run: |
          version="${VERSION#v}"
          for f in release/volta-*.tar.gz release/volta-*.msi release/volta-*.zip; do
            mv "$f" "release/volta-${version}-${f#release/volta-}"
          done
          ls -la release

      - name: Draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${VERSION#v}"
          gh release create "$tag" release/* --title "$tag" --draft \
            || gh release upload "$tag" release/* --clobber
