name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "linux", os: "ubuntu-latest", suffix: "linux" }
          - { name: "linux-arm", os: "ubuntu-22.04-arm", suffix: "linux-arm" }
          - { name: "macos", os: "macos-latest" }
          - { name: "windows", os: "windows-latest", suffix: "windows" }
          - { name: "windows-arm", os: "windows-11-arm", suffix: "windows-arm" }
    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Linux: build
      - name: Compile Volta (Linux)
        if: matrix.name == 'linux' || matrix.name == 'linux-arm'
        run: cargo build --release

      - name: Inspect Volta glibc requirement (Linux)
        if: matrix.name == 'linux' || matrix.name == 'linux-arm'
        run: |
          cd target/release
          ldd -v volta
          objdump -T volta | grep GLIBC | sed 's/.*GLIBC_\([.0-9]*\).*/\1/g' | sort -Vu

      - name: Package Volta (Linux)
        if: matrix.name == 'linux' || matrix.name == 'linux-arm'
        run: cd target/release && tar -zcvf "volta-${{ matrix.suffix }}.tar.gz" volta volta-shim volta-migrate

      # macOS: universal binary build
      - name: Set up cargo
        if: matrix.name == 'macos'
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Compile and package Volta (macOS)
        if: matrix.name == 'macos'
        run: ./ci/build-macos.sh volta-macos

      # Windows: cargo-wix build
      - name: Add cargo-wix subcommand
        if: matrix.name == 'windows' || matrix.name == 'windows-arm'
        run: cargo install --locked cargo-wix --version 0.3.8

      - name: Compile and package installer
        if: matrix.name == 'windows' || matrix.name == 'windows-arm'
        run: |
          cargo wix --nocapture --package volta --output target\wix\volta-${{ matrix.suffix }}.msi

      - name: Create zip of binaries
        if: matrix.name == 'windows' || matrix.name == 'windows-arm'
        run: powershell Compress-Archive volta*.exe volta-${{ matrix.suffix }}.zip
        working-directory: ./target/release

      # Upload artifacts
      - name: Upload release artifact
        if: matrix.name == 'linux' || matrix.name == 'linux-arm' || matrix.name == 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name == 'linux' && 'target/release/volta-linux.tar.gz' || matrix.name == 'linux-arm' && 'target/release/volta-linux-arm.tar.gz' || 'target/universal-apple-darwin/release/volta-macos.tar.gz' }}

      - name: Upload installer
        if: matrix.name == 'windows' || matrix.name == 'windows-arm'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installer${{ matrix.name == 'windows-arm' && '-arm' || '' }}
          path: target/wix/volta-${{ matrix.suffix }}.msi

      - name: Upload zip
        if: matrix.name == 'windows' || matrix.name == 'windows-arm'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-zip${{ matrix.name == 'windows-arm' && '-arm' || '' }}
          path: target/release/volta-${{ matrix.suffix }}.zip
